<!DOCTYPE html>
<html>
<head>
<title>Manage Announcements</title>
<link rel="stylesheet" href="style.css">
</head>

<body style="padding:20px">

<!-- ================= ANNOUNCEMENT SECTION ================= -->
<div style="margin-bottom:40px; padding:15px; border:2px solid gold; border-radius:10px;">

<h2>📝 Add Announcement</h2>

<textarea id="text_en" placeholder="English text" style="width:100%;height:80px;"></textarea><br><br>

<textarea id="text_ta" placeholder="Tamil text" style="width:100%;height:80px;"></textarea><br><br>

<button onclick="addAnnouncement()">Add</button>

<hr>

<h3>📋 Existing Announcements</h3>

<ul id="list" style="padding:0;"></ul>

</div>

<!-- ================= HISTORY SECTION ================= -->
<div style="padding:15px; border:2px solid gold; border-radius:10px; margin-bottom:40px;">

<h2>🏛️ Temple History Editor</h2>

<textarea id="history_en" placeholder="English History"
style="width:100%;height:100px;"></textarea><br><br>

<textarea id="history_ta" placeholder="Tamil History"
style="width:100%;height:100px;"></textarea><br><br>

<button onclick="updateHistory()">Update Temple History</button>

</div>

<!-- ================= MARQUEE 2 EDITOR ================= -->
<div style="padding:15px; border:2px solid gold; border-radius:10px; margin-bottom:40px;">

<h2>📢 Marquee 2 Editor</h2>

<textarea id="marquee_en" placeholder="English Marquee"
style="width:100%;height:80px;"></textarea><br><br>

<textarea id="marquee_ta" placeholder="Tamil Marquee"
style="width:100%;height:80px;"></textarea><br><br>

<button onclick="updateMarquee()">Update Marquee</button>

</div>

<!-- ================= ADDRESS & CONTACT EDITOR ================= -->
<div style="padding:15px; border:2px solid gold; border-radius:10px;">

<h2>📍 Address & Contact Editor</h2>

<textarea id="address_en" placeholder="English Address"
style="width:100%;height:100px;"></textarea><br><br>

<textarea id="address_ta" placeholder="Tamil Address"
style="width:100%;height:100px;"></textarea><br><br>

<textarea id="contact_en" placeholder="English Contact"
style="width:100%;height:100px;"></textarea><br><br>

<textarea id="contact_ta" placeholder="Tamil Contact"
style="width:100%;height:100px;"></textarea><br><br>

<button onclick="updateContact()">Update Address & Contact</button>

</div>

<!-- ================= SUPABASE ================= -->
<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://swbdflvfyqoeypyafjho.supabase.co",
  "sb_publishable_vCWREZqkWV1daC4x0AmWZA_RdfTXbIm"
);

/* ================= ANNOUNCEMENTS ================= */
async function addAnnouncement() {

  let en = document.getElementById("text_en").value;
  let ta = document.getElementById("text_ta").value;

  await supabase.from("announcements").insert([
    { text_en: en, text_ta: ta }
  ]);

  document.getElementById("text_en").value = "";
  document.getElementById("text_ta").value = "";

  loadList();
}

window.addAnnouncement = addAnnouncement;

async function loadList() {

  const { data } = await supabase
    .from("announcements")
    .select("*")
    .order("id", { ascending: false });

  let list = document.getElementById("list");
  list.innerHTML = "";

  if (!data) return;

  data.forEach(a => {

    let li = document.createElement("li");

    li.style.listStyle = "none";
    li.style.marginBottom = "10px";
    li.style.border = "1px solid #ddd";
    li.style.borderRadius = "8px";

    li.innerHTML = `
      <div style="padding:10px;background:#fff3e0;font-weight:bold;cursor:pointer"
        onclick="this.nextElementSibling.style.display =
        (this.nextElementSibling.style.display === 'none' ? 'block' : 'none')">

        📢 ${a.text_en}
      </div>

      <div style="display:none;padding:10px;">
        <p>${a.text_ta}</p>
        <button onclick="deleteAnnouncement(${a.id})">Delete</button>
      </div>
    `;

    list.appendChild(li);
  });
}

window.loadList = loadList;

async function deleteAnnouncement(id) {

  await supabase
    .from("announcements")
    .delete()
    .eq("id", id);

  loadList();
}

window.deleteAnnouncement = deleteAnnouncement;

/* ================= HISTORY ================= */
async function updateHistory() {

  let en = document.getElementById("history_en").value;
  let ta = document.getElementById("history_ta").value;

  await supabase
    .from("temple_content")
    .update({
      content_en: en,
      content_ta: ta
    })
    .eq("section", "history");

  alert("🏛️ Temple History Updated Successfully!");
}

window.updateHistory = updateHistory;

/* ================= MARQUEE ================= */
async function updateMarquee() {

  let en = document.getElementById("marquee_en").value;
  let ta = document.getElementById("marquee_ta").value;

  const { data } = await supabase
    .from("marquee_content")
    .select("*")
    .eq("section", "marquee2");

  if (data && data.length > 0) {

    await supabase
      .from("marquee_content")
      .update({
        text_en: en,
        text_ta: ta
      })
      .eq("section", "marquee2");

  } else {

    await supabase
      .from("marquee_content")
      .insert({
        section: "marquee2",
        text_en: en,
        text_ta: ta
      });
  }

  alert("✔ Marquee Updated");
}

window.updateMarquee = updateMarquee;

/* ================= ADDRESS & CONTACT (ONLY FIX APPLIED) ================= */
async function updateContact() {

  let address_en = document.getElementById("address_en").value;
  let address_ta = document.getElementById("address_ta").value;
  let contact_en = document.getElementById("contact_en").value;
  let contact_ta = document.getElementById("contact_ta").value;

  /* 🔥 FIX: HANDLE ADDRESS SEPARATELY */
  await supabase
    .from("temple_content")
    .upsert({
      section: "address",
      address_en: address_en,
      address_ta: address_ta
    }, { onConflict: ['section'] });

  /* 🔥 EXISTING CONTACT (UNCHANGED) */
  await supabase
    .from("temple_content")
    .upsert({
      section: "contact",
      contact_en: contact_en,
      contact_ta: contact_ta
    }, { onConflict: ['section'] });

  alert("📍 Address & Contact Updated!");
}

window.updateContact = updateContact;

/* ================= INIT ================= */
loadList();

</script>

</body>
</html>
